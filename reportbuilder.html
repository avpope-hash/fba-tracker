<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FBA Report Builder | Reimbursement Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a2a3a 0%, #1a4a6a 100%); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a2a3a 0%, #1a4a6a 100%); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-card { background: white; border-radius: 28px; padding: 40px; width: 400px; text-align: center; }
        .login-card h2 { font-size: 1.8rem; color: #1a4a6a; margin-bottom: 8px; }
        .login-input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 40px; margin-bottom: 16px; }
        .login-btn { width: 100%; background: #f59e0b; padding: 12px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; color: white; }
        
        .main-app { display: none; }
        .app-container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        .nav-bar { background: white; border-radius: 60px; padding: 8px 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-weight: 800; font-size: 1.3rem; color: #1a4a6a; }
        .nav-links { display: flex; gap: 8px; }
        .nav-btn { background: transparent; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .nav-btn.active { background: #f59e0b; color: white; }
        .user-info { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 6px 16px; border-radius: 40px; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 40px; cursor: pointer; }
        
        .upload-section { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        .upload-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; max-height: 180px; overflow-y: auto; }
        .upload-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 60px; padding: 8px 16px; display: inline-flex; align-items: center; gap: 12px; font-size: 0.75rem; }
        .upload-card label { font-weight: 600; cursor: pointer; }
        .upload-card input { display: none; }
        .badge { background: #d1fae5; padding: 2px 8px; border-radius: 30px; font-size: 0.7rem; }
        .badge-empty { background: #fee2e2; color: #991b1b; }
        
        .selection-panel { background: white; border-radius: 20px; margin-bottom: 16px; overflow: hidden; }
        .panel-header { background: #f1f5f9; padding: 14px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1rem; color: #1a4a6a; }
        .panel-header:hover { background: #e2e8f0; }
        .panel-content { padding: 16px 20px; display: none; border-top: 1px solid #e2e8f0; }
        .columns-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .col-checkbox { background: #f8fafc; padding: 6px 14px; border-radius: 40px; font-size: 0.75rem; cursor: pointer; border: 1px solid #e2e8f0; display: inline-flex; align-items: center; gap: 8px; }
        .col-checkbox.selected { background: #fef3e8; border-color: #f59e0b; }
        .sub-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .sub-checkbox { display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; cursor: pointer; background: white; padding: 4px 12px; border-radius: 40px; border: 1px solid #e2e8f0; }
        
        .action-bar { background: white; border-radius: 20px; padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
        .action-buttons { display: flex; gap: 12px; }
        .btn-primary { background: #f59e0b; padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-secondary { background: #334155; color: white; padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-success { background: #10b981; color: white; padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #ef4444; color: white; padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-info { background: #3b82f6; color: white; padding: 10px 24px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        
        .search-bar { background: white; border-radius: 20px; padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 2; padding: 10px 16px; border-radius: 40px; border: 1.5px solid #e2e8f0; min-width: 200px; }
        
        .results-area { background: white; border-radius: 24px; padding: 20px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; vertical-align: top; }
        th { background: #f1f5f9; font-weight: 700; position: sticky; top: 0; cursor: pointer; white-space: nowrap; }
        .filter-input { width: 100%; padding: 4px 6px; border-radius: 20px; border: 1px solid #cbd5e1; font-size: 0.65rem; margin-top: 4px; }
        .status-refunded-not-reimbursed { background: #fee2e2; color: #991b1b; display: inline-block; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
        .status-reimbursed { background: #d1fae5; color: #065f46; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        .status-no-refund { background: #fef3c8; color: #92400e; display: inline-block; padding: 2px 8px; border-radius: 20px; }
        
        .admin-panel { background: #fef3c7; border-radius: 24px; padding: 20px; margin-top: 20px; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #e2e8f0; }
        
        .rpob-filter-info { background: #e0e7ff; border-radius: 16px; padding: 12px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .rpob-active { background: #10b981; color: white; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .rpob-inactive { background: #64748b; color: white; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        
        @media (max-width: 768px) { .columns-grid { flex-direction: column; } }
    </style>
</head>
<body>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 FBA Report Builder</h2>
        <div class="sub">Reimbursement Tracker</div>
        <input type="text" id="loginEmail" class="login-input" placeholder="Username" value="AP">
        <input type="password" id="loginPassword" class="login-input" placeholder="Password" type="password">
        <button class="login-btn" onclick="attemptLogin()">Sign In →</button>
    </div>
</div>

<div id="mainApp" class="main-app">
    <div class="app-container">
        <div class="nav-bar">
            <div class="logo">📊 FBA Report Builder</div>
            <div class="nav-links">
                <button class="nav-btn active" data-view="builder">📋 Report Builder</button>
                <button id="adminBtn" class="nav-btn" style="display:none;">👑 Admin</button>
            </div>
            <div class="user-info">
                <span>👤 <span id="currentUserName">Admin</span></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div id="uploadSection" class="upload-section" style="display:none;">
            <div style="font-weight:600; margin-bottom:12px;">📂 Upload CSV Reports (Auto-saved to IndexedDB)</div>
            <div class="upload-grid" id="uploadGrid"></div>
        </div>

        <div id="builderView">
            <div class="search-bar">
                <input type="text" id="globalSearch" class="search-input" placeholder="🔍 Search across all data (Order ID, SKU, ASIN, Product Name)...">
                <button id="toggleRefundedNotReimbursedBtn" class="btn-danger">💰 Show Only Refunded NOT Reimbursed</button>
            </div>

            <div id="rpobFilterStatus" class="rpob-filter-info" style="display:none;">
                <span>📋 RP OB Report Filter: <strong id="rpobCount">0</strong> Order IDs loaded</span>
                <span id="rpobActiveBadge" class="rpob-inactive">Filter Inactive</span>
                <button id="toggleRpobFilterBtn" class="btn-secondary" style="padding: 4px 16px;">Enable Filter</button>
            </div>

            <div id="selectionPanels"></div>

            <div class="action-bar">
                <div class="action-buttons">
                    <button id="selectAllColsBtn" class="btn-secondary">✓ Select All Columns</button>
                    <button id="deselectAllColsBtn" class="btn-secondary">✗ Deselect All Columns</button>
                </div>
                <div class="action-buttons">
                    <button id="generateReportBtn" class="btn-primary">🔍 Generate Report</button>
                    <button id="exportRemovalsCsvBtn" class="btn-info">📦 Export for Removals</button>
                    <button id="exportCsvBtn" class="btn-success">📎 Export Full CSV</button>
                </div>
            </div>

            <div id="resultsArea" class="results-area">
                <div style="color:#666; text-align:center; padding:40px;">Select columns and filters above, then click "Generate Report"</div>
            </div>
        </div>

        <div id="adminView" style="display:none;"></div>
    </div>
</div>

<script>
    // ========== USER MANAGEMENT ==========
    let currentUser = null;
    let isAdmin = false;
    let users = [{ id: 1, email: 'AP', password: 'pandrei', name: 'Admin', role: 'admin' }];
    
    function saveUsers() { localStorage.setItem('fba_users', JSON.stringify(users)); }
    function loadUsers() { const s = localStorage.getItem('fba_users'); if(s) users = JSON.parse(s); }
    loadUsers();

    function attemptLogin() {
        const email = document.getElementById('loginEmail').value;
        const pwd = document.getElementById('loginPassword').value;
        const user = users.find(u => u.email === email && u.password === pwd);
        if(user) {
            currentUser = user;
            isAdmin = user.role === 'admin';
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('currentUserName').innerText = user.name;
            if(isAdmin) {
                document.getElementById('adminBtn').style.display = 'inline-block';
                document.getElementById('uploadSection').style.display = 'block';
            } else {
                document.getElementById('adminBtn').style.display = 'none';
                document.getElementById('uploadSection').style.display = 'none';
            }
            initApp();
        } else {
            alert('Invalid credentials');
        }
    }
    function logout() { document.getElementById('loginOverlay').style.display = 'flex'; document.getElementById('mainApp').style.display = 'none'; }

    // ========== INDEXEDDB ==========
    const DB_NAME = 'FBAReportBuilder';
    const DB_VERSION = 6;
    let db = null;

    const MAIN_REPORTS = [
        { id: "fbaReturns", name: "FBA Returns", storeName: "fbaReturns", headers: ["return-date","order-id","sku","asin","fnsku","product-name","quantity","fulfillment-center-id","detailed-disposition","reason","status","license-plate-number","customer-comments"] },
        { id: "gradeResell", name: "Grade & Resell", storeName: "gradeResell", headers: ["date","order-id","value-recovery-type","lpn","manual-order-item-id","merchant-sku","fnsku","asin","quantity","unit-status","reason-for-unit-status","grade-and-resell-used-condition","grade-and-resell-used-merchant-sku","grade-and-resell-used-fnsku"] },
        { id: "reimbursements", name: "Reimbursements", storeName: "reimbursements", headers: ["approval-date","reimbursement-id","case-id","amazon-order-id","reason","sku","fnsku","asin","product-name","condition","currency-unit","amount-per-unit","amount-total","quantity-reimbursed-cash","quantity-reimbursed-inventory","quantity-reimbursed-total","original-reimbursement-id","original-reimbursement-type"] },
        { id: "reportsRepo", name: "Reports Repository", storeName: "reportsRepo", headers: ["date/time","settlement id","type","order id","sku","description","quantity","marketplace","fulfilment","order city","order state","order postal","tax collection model","product sales","product sales tax","postage credits","shipping credits tax","gift wrap credits","giftwrap credits tax","promotional rebates","promotional rebates tax","marketplace withheld tax","selling fees","fba fees","other transaction fees","other","total","Transaction status","Transaction Release Date"] },
        { id: "returnsReconciliation", name: "Returns Reconciliation", storeName: "returnsReconciliation", headers: ["Return type","Customer order ID","Shipment ID","FNSKU","SKU","ASIN","Custom ID1","Custom ID2","Custom ID3","Units","Forward leg tracking ID","Reverse leg tracking ID","Return merchandise authorisation","ID","Return status","Carrier","Pick-up date","Last updated on","Returned with OTP","Days In-transit","Days Since Return Complete","Return Reason","LPN"] },
        { id: "rpobReport", name: "RP OB Report", storeName: "rpobReport", headers: ["Serial number(s).1", "Order ID"] }
    ];

    let datasets = { fbaReturns: [], gradeResell: [], reimbursements: [], reportsRepo: [], returnsReconciliation: [], rpobReport: [] };
    
    let rpobFilterEnabled = false;
    let rpobOrderIds = new Set();
    
    const detailedDispositions = ["CARRIER_DAMAGED", "CUSTOMER_DAMAGED", "DEFECTIVE", "SELLABLE"];
    const unitStatuses = ["Failed", "Succeeded"];
    const gradeConditions = ["Used - Acceptable", "Used - Good", "Used - Like New", "Used - Poor", "Used - Very Good"];
    const refundTransactionTypes = ["Refund", "Chargeback Refund", "Refund_Retrocharge"];
    const returnStatuses = ["Picked up from customer", "Return initiated", "In transit to Seller Flex node", "Return processed in FC", "Stop and return request by Amazon"];

    const displayColumns = [
        { name: 'Return Date', report: 'FBA Returns / RR' },
        { name: 'Order ID', report: 'All Reports' },
        { name: 'Merchant SKU', report: 'Grade & Resell / FBA Returns' },
        { name: 'ASIN', report: 'All Reports' },
        { name: 'FNSKU', report: 'All Reports' },
        { name: 'Grade Changed FNSKU', report: 'Grade & Resell' },
        { name: 'Detailed Disposition', report: 'FBA Returns' },
        { name: 'Grade Unit Status', report: 'Grade & Resell' },
        { name: 'Grade Condition', report: 'Grade & Resell' },
        { name: 'Reimbursement ID', report: 'Reimbursements' },
        { name: 'Repo Transaction Type', report: 'Reports Repository' },
        { name: 'Recon Return Status', report: 'Returns Reconciliation' },
        { name: 'Recon Days In-transit', report: 'Returns Reconciliation' },
        { name: 'Has Refund in Repo?', report: 'Calculated' },
        { name: 'Has Reimbursement?', report: 'Calculated' },
        { name: 'In FBA Returns?', report: 'Calculated' },
        { name: 'In Grade & Resell?', report: 'Calculated' },
        { name: 'In Returns Reconciliation?', report: 'Calculated' },
        { name: 'Status', report: 'Calculated' }
    ];

    let selectedColumns = {};
    let selectedDispositions = [...detailedDispositions];
    let selectedUnitStatuses = [...unitStatuses];
    let selectedGradeConditions = [...gradeConditions];
    let selectedReturnStatuses = [...returnStatuses];
    let showRefundedNotReimbursedOnly = false;
    let currentReportData = [];
    let currentColumns = [];
    let columnFilters = {};
    let sortColumn = null;
    let sortDirection = 'asc';

    function formatDate(dateStr) {
        if(!dateStr) return '-';
        try { 
            let d = new Date(dateStr); 
            if(isNaN(d.getTime())) return '-'; 
            return `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear().toString().slice(-2)}`; 
        } catch(e) { return '-'; }
    }

    function initIndexedDB() {
        return new Promise((resolve, reject) => {
            const r = indexedDB.open(DB_NAME, DB_VERSION);
            r.onerror = () => reject(r.error);
            r.onsuccess = () => { db = r.result; loadAllData().then(resolve); };
            r.onupgradeneeded = (e) => {
                const db_ = e.target.result;
                MAIN_REPORTS.forEach(rpt => { if (!db_.objectStoreNames.contains(rpt.storeName)) db_.createObjectStore(rpt.storeName); });
            };
        });
    }

    async function saveToDB(storeName, data) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction([storeName], 'readwrite');
            tx.objectStore(storeName).put(data, 'data');
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
        });
    }

    async function loadFromDB(storeName) {
        return new Promise((resolve) => {
            const tx = db.transaction([storeName], 'readonly');
            const req = tx.objectStore(storeName).get('data');
            req.onsuccess = () => resolve(req.result || []);
            req.onerror = () => resolve([]);
        });
    }

    async function loadAllData() {
        for(const r of MAIN_REPORTS) {
            datasets[r.id] = await loadFromDB(r.storeName);
            updateBadge(r.id, datasets[r.id].length);
            if(r.id === 'rpobReport') updateRpobFilterSet();
        }
        updateRpobFilterUI();
    }

    function updateRpobFilterSet() {
        rpobOrderIds.clear();
        const rpobData = datasets.rpobReport || [];
        for(const row of rpobData) {
            const orderId = row['Order ID']?.toString().trim();
            if(orderId) rpobOrderIds.add(orderId);
        }
        const ce = document.getElementById('rpobCount');
        if(ce) ce.innerText = rpobOrderIds.size;
    }

    function updateRpobFilterUI() {
        const statusDiv = document.getElementById('rpobFilterStatus');
        const badge = document.getElementById('rpobActiveBadge');
        const btn = document.getElementById('toggleRpobFilterBtn');
        if(datasets.rpobReport?.length > 0) {
            if(statusDiv) statusDiv.style.display = 'flex';
            if(rpobFilterEnabled) {
                if(badge) { badge.innerText = '✅ Filter Active'; badge.className = 'rpob-active'; }
                if(btn) btn.innerText = 'Disable Filter';
            } else {
                if(badge) { badge.innerText = '⭕ Filter Inactive'; badge.className = 'rpob-inactive'; }
                if(btn) btn.innerText = 'Enable Filter';
            }
        } else if(statusDiv) statusDiv.style.display = 'none';
    }

    function toggleRpobFilter() { rpobFilterEnabled = !rpobFilterEnabled; updateRpobFilterUI(); renderReport(); }

    function updateBadge(id, count) {
        const b = document.getElementById(`badge-${id}`);
        if(b) { b.innerText = count > 0 ? `✅ ${count.toLocaleString()}` : '📁 Upload'; b.className = count > 0 ? "badge" : "badge badge-empty"; }
    }

    function parseCSV(text) {
        const lines = []; let cur = "", inQ = false;
        for(let i=0;i<text.length;i++) { cur += text[i]; if(text[i] === '"') inQ = !inQ; if(text[i] === '\n' && !inQ) { if(cur.trim()) lines.push(cur.trim()); cur = ""; } }
        if(cur.trim()) lines.push(cur.trim());
        if(lines.length<2) return [];
        const parseLine = (l) => {
            let res=[], curr="", q=false;
            for(let i=0;i<l.length;i++) {
                let c=l[i];
                if(c==='"') { if(q && l[i+1]==='"') { curr+='"'; i++; } else q=!q; }
                else if(c===',' && !q) { res.push(curr.trim()); curr=""; }
                else curr+=c;
            }
            res.push(curr.trim());
            return res.map(v=>v.replace(/^"|"$/g,''));
        };
        const headers = parseLine(lines[0]);
        const result = [];
        for(let i=1;i<lines.length;i++) {
            const vals = parseLine(lines[i]);
            if(vals.length < 2) continue;
            let obj = {};
            headers.forEach((h,idx) => { obj[h] = vals[idx] || ""; });
            result.push(obj);
        }
        return result;
    }

    async function handleUpload(reportId, file) {
        if(!isAdmin) { alert("Admin only"); return; }
        const reader = new FileReader();
        reader.onload = async (e) => {
            const parsed = parseCSV(e.target.result);
            if(parsed.length) {
                await saveToDB(MAIN_REPORTS.find(r=>r.id===reportId).storeName, parsed);
                datasets[reportId] = parsed;
                updateBadge(reportId, parsed.length);
                if(reportId === 'rpobReport') { updateRpobFilterSet(); updateRpobFilterUI(); }
                alert(`Loaded ${parsed.length.toLocaleString()} rows`);
            } else alert("Parse failed");
        };
        reader.readAsText(file);
    }

    function buildUploadUI() {
        const c = document.getElementById('uploadGrid');
        c.innerHTML = '';
        MAIN_REPORTS.forEach(r => {
            const card = document.createElement('div');
            card.className = 'upload-card';
            card.innerHTML = `<label for="up-${r.id}">📄 ${r.name}</label><input type="file" accept=".csv" id="up-${r.id}"><span id="badge-${r.id}" class="badge badge-empty">📁</span>`;
            c.appendChild(card);
            const inp = card.querySelector('input');
            inp.addEventListener('change', (e) => { if(e.target.files.length) handleUpload(r.id, e.target.files[0]); });
        });
    }

    function getOrderId(row, reportType) {
        if(!row) return null;
        if(reportType === 'fbaReturns' && row['order-id']) return row['order-id'].toString().trim();
        if(reportType === 'gradeResell' && row['order-id']) return row['order-id'].toString().trim();
        if(reportType === 'reimbursements' && row['amazon-order-id']) return row['amazon-order-id'].toString().trim();
        if(reportType === 'reportsRepo' && row['order id']) return row['order id'].toString().trim();
        if(reportType === 'returnsReconciliation' && row['Customer order ID']) return row['Customer order ID'].toString().trim();
        if(reportType === 'rpobReport' && row['Order ID']) return row['Order ID'].toString().trim();
        return null;
    }

    function generateMergedReport() {
        const searchTerm = document.getElementById('globalSearch')?.value.toLowerCase() || '';
        const returnsData = datasets.fbaReturns || [];
        const gradeData = datasets.gradeResell || [];
        const reimbData = datasets.reimbursements || [];
        const repoData = datasets.reportsRepo || [];
        const reconData = datasets.returnsReconciliation || [];
        
        const gradeMap = new Map(); gradeData.forEach(row => { const oid = getOrderId(row, 'gradeResell'); if(oid) gradeMap.set(oid, row); });
        const reimbMap = new Map(); reimbData.forEach(row => { const oid = getOrderId(row, 'reimbursements'); if(oid) reimbMap.set(oid, row); });
        const repoMap = new Map(); repoData.forEach(row => { const oid = getOrderId(row, 'reportsRepo'); if(oid) repoMap.set(oid, row); });
        const reconMap = new Map(); reconData.forEach(row => { const oid = getOrderId(row, 'returnsReconciliation'); if(oid) reconMap.set(oid, row); });
        
        const allOrderIds = new Set();
        returnsData.forEach(row => { const oid = getOrderId(row, 'fbaReturns'); if(oid) allOrderIds.add(oid); });
        gradeData.forEach(row => { const oid = getOrderId(row, 'gradeResell'); if(oid) allOrderIds.add(oid); });
        reconData.forEach(row => { const oid = getOrderId(row, 'returnsReconciliation'); if(oid) allOrderIds.add(oid); });
        
        const results = [];
        for(const orderId of allOrderIds) {
            if(rpobFilterEnabled && !rpobOrderIds.has(orderId)) continue;
            const returnRow = returnsData.find(r => getOrderId(r, 'fbaReturns') === orderId);
            const gradeRow = gradeMap.get(orderId);
            const reimbRow = reimbMap.get(orderId);
            const repoRow = repoMap.get(orderId);
            const reconRow = reconMap.get(orderId);
            
            const disposition = returnRow ? returnRow['detailed-disposition'] : '';
            if(!selectedDispositions.includes(disposition) && selectedDispositions.length > 0 && returnRow) continue;
            const unitStatus = gradeRow ? gradeRow['unit-status'] : '';
            if(!selectedUnitStatuses.includes(unitStatus) && selectedUnitStatuses.length > 0 && gradeRow) continue;
            const gradeCondition = gradeRow ? gradeRow['grade-and-resell-used-condition'] : '';
            if(!selectedGradeConditions.includes(gradeCondition) && selectedGradeConditions.length > 0 && gradeRow) continue;
            const returnStatus = reconRow ? reconRow['Return status'] : '';
            if(!selectedReturnStatuses.includes(returnStatus) && selectedReturnStatuses.length > 0 && reconRow) continue;
            
            const transactionType = repoRow ? repoRow['type'] : '';
            const hasRefund = repoRow && refundTransactionTypes.includes(transactionType);
            const hasReimbursement = !!reimbRow;
            if(showRefundedNotReimbursedOnly && !(hasRefund && !hasReimbursement)) continue;
            
            if(searchTerm) {
                const searchable = `${orderId} ${returnRow?.sku || ''} ${returnRow?.asin || ''} ${returnRow?.['product-name'] || ''} ${gradeRow?.sku || ''} ${reconRow?.SKU || ''}`.toLowerCase();
                if(!searchable.includes(searchTerm)) continue;
            }
            
            const row = {};
            
            // ===== RETURN DATE: PRIORITIZE RETURNS RECONCILIATION WITH (RR) TAG =====
            let returnDateValue = '-';
            if(reconRow && reconRow['Pick-up date']) {
                returnDateValue = formatDate(reconRow['Pick-up date']) + ' (RR)';
            } else if(reconRow && reconRow['Last updated on']) {
                returnDateValue = formatDate(reconRow['Last updated on']) + ' (RR)';
            } else if(returnRow && returnRow['return-date']) {
                returnDateValue = formatDate(returnRow['return-date']);
            }
            
            // ===== MERCHANT SKU: PRIORITIZE GRADE & RESELL USED MERCHANT SKU, THEN MERCHANT SKU, THEN FBA RETURNS SKU =====
            let merchantSkuValue = '-';
            if(gradeRow && gradeRow['grade-and-resell-used-merchant-sku'] && gradeRow['grade-and-resell-used-merchant-sku'] !== '') {
                merchantSkuValue = gradeRow['grade-and-resell-used-merchant-sku'];
            } else if(gradeRow && gradeRow['merchant-sku'] && gradeRow['merchant-sku'] !== '') {
                merchantSkuValue = gradeRow['merchant-sku'];
            } else if(returnRow && returnRow['sku'] && returnRow['sku'] !== '') {
                merchantSkuValue = returnRow['sku'];
            }
            
            let asinValue = '-';
            if(returnRow && returnRow['asin']) asinValue = returnRow['asin'];
            else if(gradeRow && gradeRow['asin']) asinValue = gradeRow['asin'];
            else if(reconRow && reconRow['ASIN']) asinValue = reconRow['ASIN'];
            
            let fnskuValue = '-';
            if(returnRow && returnRow['fnsku']) fnskuValue = returnRow['fnsku'];
            else if(gradeRow && gradeRow['fnsku']) fnskuValue = gradeRow['fnsku'];
            else if(reconRow && reconRow['FNSKU']) fnskuValue = reconRow['FNSKU'];
            
            let gradeChangedFnsku = '-';
            if(gradeRow && gradeRow['grade-and-resell-used-fnsku'] && gradeRow['grade-and-resell-used-fnsku'] !== fnskuValue) gradeChangedFnsku = gradeRow['grade-and-resell-used-fnsku'];
            
            if(selectedColumns['Return Date']) row['Return Date'] = returnDateValue;
            if(selectedColumns['Order ID']) row['Order ID'] = orderId;
            if(selectedColumns['Merchant SKU']) row['Merchant SKU'] = merchantSkuValue;
            if(selectedColumns['ASIN']) row['ASIN'] = asinValue;
            if(selectedColumns['FNSKU']) row['FNSKU'] = fnskuValue;
            if(selectedColumns['Grade Changed FNSKU']) row['Grade Changed FNSKU'] = gradeChangedFnsku;
            if(selectedColumns['Detailed Disposition']) row['Detailed Disposition'] = disposition || '-';
            if(selectedColumns['Grade Unit Status']) row['Grade Unit Status'] = unitStatus || '-';
            if(selectedColumns['Grade Condition']) row['Grade Condition'] = gradeCondition || '-';
            if(selectedColumns['Reimbursement ID']) row['Reimbursement ID'] = reimbRow ? (reimbRow['reimbursement-id'] || '-') : '-';
            if(selectedColumns['Repo Transaction Type']) row['Repo Transaction Type'] = transactionType || '-';
            if(selectedColumns['Recon Return Status']) row['Recon Return Status'] = returnStatus || '-';
            if(selectedColumns['Recon Days In-transit']) row['Recon Days In-transit'] = reconRow ? (reconRow['Days In-transit'] || '-') : '-';
            if(selectedColumns['Has Refund in Repo?']) row['Has Refund in Repo?'] = hasRefund ? 'YES' : 'NO';
            if(selectedColumns['Has Reimbursement?']) row['Has Reimbursement?'] = hasReimbursement ? 'YES' : 'NO';
            if(selectedColumns['In FBA Returns?']) row['In FBA Returns?'] = returnRow ? 'YES' : 'NO';
            if(selectedColumns['In Grade & Resell?']) row['In Grade & Resell?'] = gradeRow ? 'YES' : 'NO';
            if(selectedColumns['In Returns Reconciliation?']) row['In Returns Reconciliation?'] = reconRow ? 'YES' : 'NO';
            
            if(selectedColumns['Status']) {
                let status = '';
                if(hasRefund && !hasReimbursement) status = '💰 REFUNDED NOT REIMBURSED';
                else if(hasReimbursement) status = '✅ REIMBURSED';
                else status = '❓ NO REFUND FOUND';
                row['Status'] = status;
            }
            results.push(row);
        }
        return results;
    }

    function renderReport() {
        const data = generateMergedReport();
        if(!data || data.length === 0) {
            document.getElementById('resultsArea').innerHTML = '<div class="results-area" style="text-align:center; padding:40px;">⚠️ No results found.</div>';
            return;
        }
        currentReportData = data;
        currentColumns = Object.keys(data[0]);
        columnFilters = {};
        let html = `<div style="margin-bottom:16px;"><strong>📊 ${data.length} unique Order IDs</strong></div><div style="overflow-x:auto;"><table id="reportTable"><thead><tr>`;
        for(const col of currentColumns) html += `<th onclick="sortByColumn('${col.replace(/'/g,"\\'")}')">${col}<span style="font-size:0.6rem;">${sortColumn === col ? (sortDirection === 'asc' ? '↑' : '↓') : ''}</span><input type="text" class="filter-input" data-col="${col.replace(/'/g,"\\'")}" placeholder="Filter..." oninput="filterColumn('${col.replace(/'/g,"\\'")}', this.value)"></th>`;
        html += `</thead><tbody id="tableBody"></tbody></table></div>`;
        document.getElementById('resultsArea').innerHTML = html;
        renderTableBody();
    }
    
    function renderTableBody() {
        let filteredData = [...currentReportData];
        for(const [col, filterVal] of Object.entries(columnFilters)) if(filterVal) filteredData = filteredData.filter(row => (row[col]?.toString().toLowerCase() || '').includes(filterVal.toLowerCase()));
        if(sortColumn) filteredData.sort((a,b) => { let aVal = a[sortColumn] || '', bVal = b[sortColumn] || ''; return sortDirection === 'asc' ? aVal.toString().localeCompare(bVal.toString()) : -aVal.toString().localeCompare(bVal.toString()); });
        const tbody = document.getElementById('tableBody');
        if(!tbody) return;
        tbody.innerHTML = '';
        for(const row of filteredData.slice(0,5000)) {
            let tr = '</tr>';
            for(const col of currentColumns) {
                let val = row[col] || '-', className = '';
                if(col === 'Status') {
                    if(val.includes('REFUNDED NOT REIMBURSED')) className = 'status-refunded-not-reimbursed';
                    else if(val.includes('REIMBURSED')) className = 'status-reimbursed';
                    else className = 'status-no-refund';
                    tr += `<td><span class="${className}">${val}</span></td>`;
                } else tr += `<td>${val}</td>`;
            }
            tr += '</tr>';
            tbody.innerHTML += tr;
        }
    }
    
    function sortByColumn(col) { if(sortColumn === col) sortDirection = sortDirection === 'asc' ? 'desc' : 'asc'; else { sortColumn = col; sortDirection = 'asc'; } renderTableBody(); }
    function filterColumn(col, value) { columnFilters[col] = value; renderTableBody(); }
    
    function exportFullCSV() {
        if(!currentReportData.length) { alert("Generate report first"); return; }
        let filteredData = [...currentReportData];
        for(const [col, filterVal] of Object.entries(columnFilters)) if(filterVal) filteredData = filteredData.filter(row => (row[col]?.toString().toLowerCase() || '').includes(filterVal.toLowerCase()));
        const headers = currentColumns;
        const rows = filteredData.map(row => headers.map(h => `"${String(row[h] || '-').replace(/"/g, '""')}"`).join(','));
        const csv = [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `full_report_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
    }
    
    function exportForRemovalsCSV() {
        if(!currentReportData.length) { alert("Generate report first"); return; }
        let filteredData = [...currentReportData];
        for(const [col, filterVal] of Object.entries(columnFilters)) if(filterVal) filteredData = filteredData.filter(row => (row[col]?.toString().toLowerCase() || '').includes(filterVal.toLowerCase()));
        const removalsHeaders = ['Return Date', 'Order ID', 'Merchant SKU', 'ASIN', 'FNSKU', 'Grade Changed FNSKU', 'Detailed Disposition'];
        const rows = filteredData.map(row => removalsHeaders.map(h => `"${String(row[h] || '-').replace(/"/g, '""')}"`).join(','));
        const csv = [removalsHeaders.join(','), ...rows].join('\n');
        const blob = new Blob([csv], {type: 'text/csv'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `removals_input_${new Date().toISOString().slice(0,19)}.csv`;
        a.click();
        alert(`Exported ${filteredData.length} records for Removals Tracker`);
    }

    function buildSelectionPanels() {
        const container = document.getElementById('selectionPanels');
        displayColumns.forEach(col => selectedColumns[col.name] = true);
        let columnsHtml = `<div class="selection-panel"><div class="panel-header" onclick="togglePanel(this)">📋 SELECT COLUMNS (${displayColumns.length})</div><div class="panel-content"><div class="columns-grid">${displayColumns.map(col => `<label class="col-checkbox selected" data-col="${col.name}"><input type="checkbox" class="col-select" checked onchange="toggleColumn('${col.name}',this.checked)"><span>${col.name}</span><span style="font-size:0.6rem;">(${col.report})</span></label>`).join('')}</div></div></div>`;
        const filtersHtml = `<div class="selection-panel"><div class="panel-header" onclick="togglePanel(this)">🔧 1. Detailed Disposition</div><div class="panel-content"><div class="sub-grid">${detailedDispositions.map(d => `<label class="sub-checkbox"><input type="checkbox" value="${d}" class="disposition-filter" ${selectedDispositions.includes(d) ? 'checked' : ''}> ${d}</label>`).join('')}</div></div></div>
        <div class="selection-panel"><div class="panel-header" onclick="togglePanel(this)">🏷️ 2. Grade Unit Status</div><div class="panel-content"><div class="sub-grid">${unitStatuses.map(s => `<label class="sub-checkbox"><input type="checkbox" value="${s}" class="unitstatus-filter" ${selectedUnitStatuses.includes(s) ? 'checked' : ''}> ${s}</label>`).join('')}</div></div></div>
        <div class="selection-panel"><div class="panel-header" onclick="togglePanel(this)">⭐ 3. Grade Condition</div><div class="panel-content"><div class="sub-grid">${gradeConditions.map(c => `<label class="sub-checkbox"><input type="checkbox" value="${c}" class="gradecondition-filter" ${selectedGradeConditions.includes(c) ? 'checked' : ''}> ${c}</label>`).join('')}</div></div></div>
        <div class="selection-panel"><div class="panel-header" onclick="togglePanel(this)">🔄 4. Return Status</div><div class="panel-content"><div class="sub-grid">${returnStatuses.map(s => `<label class="sub-checkbox"><input type="checkbox" value="${s}" class="returnstatus-filter" ${selectedReturnStatuses.includes(s) ? 'checked' : ''}> ${s}</label>`).join('')}</div></div></div>`;
        container.innerHTML = columnsHtml + filtersHtml;
        document.querySelectorAll('.disposition-filter').forEach(cb => cb.addEventListener('change', () => selectedDispositions = Array.from(document.querySelectorAll('.disposition-filter:checked')).map(c=>c.value)));
        document.querySelectorAll('.unitstatus-filter').forEach(cb => cb.addEventListener('change', () => selectedUnitStatuses = Array.from(document.querySelectorAll('.unitstatus-filter:checked')).map(c=>c.value)));
        document.querySelectorAll('.gradecondition-filter').forEach(cb => cb.addEventListener('change', () => selectedGradeConditions = Array.from(document.querySelectorAll('.gradecondition-filter:checked')).map(c=>c.value)));
        document.querySelectorAll('.returnstatus-filter').forEach(cb => cb.addEventListener('change', () => selectedReturnStatuses = Array.from(document.querySelectorAll('.returnstatus-filter:checked')).map(c=>c.value)));
    }
    
    function toggleColumn(colName, isChecked) { selectedColumns[colName] = isChecked; const l = document.querySelector(`.col-select[data-col="${colName}"]`)?.closest('.col-checkbox'); if(l) isChecked ? l.classList.add('selected') : l.classList.remove('selected'); }
    function selectAllColumns() { displayColumns.forEach(col => selectedColumns[col.name]=true); document.querySelectorAll('.col-select').forEach(cb => { cb.checked=true; cb.closest('.col-checkbox')?.classList.add('selected'); }); }
    function deselectAllColumns() { displayColumns.forEach(col => selectedColumns[col.name]=false); document.querySelectorAll('.col-select').forEach(cb => { cb.checked=false; cb.closest('.col-checkbox')?.classList.remove('selected'); }); }
    function togglePanel(header) { const c = header.nextElementSibling; if(c) c.style.display = c.style.display === 'none' ? 'block' : 'none'; }
    
    function renderAdminPanel() {
        let usersHtml = users.map(u => `<div class="user-row"><span><strong>${u.email}</strong> (${u.role})</span><div>${u.id === 1 ? '<span style="color:#666;">Cannot delete</span>' : `<button onclick="deleteUser(${u.id})">Delete</button>`}</div></div>`).join('');
        return `<div class="admin-panel"><h3>👑 Admin Panel</h3><div><input type="text" id="newUserEmail" placeholder="Username"><input type="password" id="newUserPassword" placeholder="Password"><select id="newUserRole"><option value="user">User</option><option value="admin">Admin</option></select><button onclick="addUser()">Add User</button></div><div id="usersList">${usersHtml}</div><hr><h4>🔌 SP-API Credentials</h4><div><input type="text" id="apiClientId" placeholder="Client ID"><input type="text" id="apiClientSecret" placeholder="Client Secret"><input type="text" id="apiRefreshToken" placeholder="Refresh Token"><input type="text" id="apiMarketplaceId" placeholder="Marketplace ID"><button onclick="saveApiCreds()">Save</button></div></div>`;
    }
    
    function addUser() {
        const email = document.getElementById('newUserEmail')?.value, pwd = document.getElementById('newUserPassword')?.value, role = document.getElementById('newUserRole')?.value;
        if(!email || !pwd) { alert("Email and password required"); return; }
        if(users.find(u=>u.email===email)) { alert("User exists"); return; }
        users.push({ id: Date.now(), email, password: pwd, name: email.split('@')[0], role });
        saveUsers();
        if(isAdmin) document.getElementById('adminView').innerHTML = renderAdminPanel();
        alert(`User ${email} added`);
    }
    window.deleteUser = function(id) { if(id === 1) { alert("Cannot delete main admin"); return; } users = users.filter(u=>u.id!==id); saveUsers(); if(isAdmin) document.getElementById('adminView').innerHTML = renderAdminPanel(); alert("User deleted"); };
    function saveApiCreds() { const creds = { clientId: document.getElementById('apiClientId')?.value, clientSecret: document.getElementById('apiClientSecret')?.value, refreshToken: document.getElementById('apiRefreshToken')?.value, marketplaceId: document.getElementById('apiMarketplaceId')?.value }; localStorage.setItem('fba_api', JSON.stringify(creds)); alert("Credentials saved"); }
    
    function switchView(view) {
        document.getElementById('builderView').style.display = view === 'builder' ? 'block' : 'none';
        document.getElementById('adminView').style.display = view === 'admin' ? 'block' : 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(view === 'builder') document.querySelector('[data-view="builder"]').classList.add('active');
        else if(view === 'admin') document.getElementById('adminBtn').classList.add('active');
        if(view === 'admin' && isAdmin) document.getElementById('adminView').innerHTML = renderAdminPanel();
    }
    
    async function initApp() {
        buildUploadUI(); buildSelectionPanels(); await initIndexedDB();
        document.getElementById('generateReportBtn').onclick = renderReport;
        document.getElementById('exportCsvBtn').onclick = exportFullCSV;
        document.getElementById('exportRemovalsCsvBtn').onclick = exportForRemovalsCSV;
        document.getElementById('selectAllColsBtn').onclick = selectAllColumns;
        document.getElementById('deselectAllColsBtn').onclick = deselectAllColumns;
        document.getElementById('toggleRefundedNotReimbursedBtn').onclick = () => { showRefundedNotReimbursedOnly = !showRefundedNotReimbursedOnly; document.getElementById('toggleRefundedNotReimbursedBtn').style.background = showRefundedNotReimbursedOnly ? '#dc2626' : '#ef4444'; renderReport(); };
        document.getElementById('toggleRpobFilterBtn').onclick = toggleRpobFilter;
        document.getElementById('adminBtn').onclick = () => switchView('admin');
        document.querySelector('[data-view="builder"]').onclick = () => switchView('builder');
        const firstPanel = document.querySelector('.panel-header'); if(firstPanel) togglePanel(firstPanel);
        selectAllColumns();
        setTimeout(() => { if(datasets.fbaReturns?.length || datasets.gradeResell?.length || datasets.returnsReconciliation?.length) renderReport(); }, 500);
    }
    
    window.sortByColumn = sortByColumn; window.filterColumn = filterColumn; window.togglePanel = togglePanel; window.toggleColumn = toggleColumn;
</script>
</body>
</html>
